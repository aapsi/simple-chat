name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy --all -- -D warnings

      - name: Run tests
        run: cargo test --all

  smoke:
    runs-on: ubuntu-latest
    needs: check
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --all

      - name: Smoke test — server and client exchange
        run: |
          cargo run --bin server &
          SERVER_PID=$!
          sleep 2

          echo '{"type":"join","username":"ci-bot"}' | nc -q 1 127.0.0.1 8080 &
          sleep 1

          echo '{"type":"send","content":"hello from ci"}' | nc -q 1 127.0.0.1 8080 &
          sleep 1

          kill $SERVER_PID
          echo "Smoke test passed"
